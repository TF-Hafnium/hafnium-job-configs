- job:
    name: "hafnium-lts-create-release"
    node: "docker-amd64-hafnium-noble"
    project-type: "freestyle"
    concurrent: false
    disabled: false
    description: "Create a new Hafnium LTS release from a tip of an LTS branch."

    properties:
      - build-discarder:
          days-to-keep: 365
          num-to-keep: 30

    parameters:
      - string:
          name: "GERRIT_HOST"
          default: "review.trustedfirmware.org"

      - string:
          name: "GERRIT_PROJECT"
          default: "{gerrit_project_prefix}hafnium/hafnium"

          description: |
            Hafnium Git project

      - string:
          name: "GERRIT_BRANCH"
          default: "lts-v2.14"

          description: |
            Git branch to release from (lts-v2.14, etc.)

      - string:
          name: "CI_SCRIPTS_URL"
          default: "https://git.trustedfirmware.org/{gerrit_project_prefix}ci/hafnium-ci-scripts.git"

          description: |
            URL of the hafnium-ci-scripts repository to clone.

      - bool:
          name: "SANDBOX_RUN"
          default: true

          description: |
            Run sandbox simulation of a release. A tag will be created in
            separate "sandbox" namespace, and further actions like release
            email sending will be also sandboxed.
            Uncheck this only after running a simulation and verifying that
            everything is correct!

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - "timestamps"

      - timeout:
          timeout: 30
          fail: true

    builders:
      - shell: |
          #!/bin/bash
          set -ex
          env | grep GERRIT
          echo SANDBOX_RUN=$SANDBOX_RUN

          git clone "$CI_SCRIPTS_URL"
          git clone https://$GERRIT_HOST/$GERRIT_PROJECT
          DIR=$(basename $GERRIT_PROJECT)
          cd $DIR
          git checkout $GERRIT_BRANCH

          set +x
          nvm install
          set -x
          npm install --no-save standard-version

          git config user.email "ci@trustedfirmware.org"
          git config user.name "Release CI"
          # Install Change-Id hook
          f="$(git rev-parse --git-dir)/hooks/commit-msg"; curl -o "$f" https://review.trustedfirmware.org/tools/hooks/commit-msg ; chmod +x "$f"

          if [ "$SANDBOX_RUN" == "true" ]; then
              echo "" >> README.md
              git commit -a -s -m "fix(readme): dummy commit for sandbox release"
          fi

          # Generate changelog (commit-and-tag-version with skip.commit and skip.tag)
          # This only updates docs/change-log.md and bumps version in package.json
          npm run release -- --release-as patch --tag-prefix lts-v

          # Read the version from package.json
          RELEASE=$(node -e "console.log(require('./package.json').version)")

          git diff
          git add -A
          git commit -s -m "docs(changelog): changelog for lts-v${{RELEASE}} release"

          if [ "$SANDBOX_RUN" == "true" ]; then
              TAG="sandbox/lts-v${{RELEASE}}-$(date +%Y%m%dT%H%M)"
          else
              TAG="lts-v${{RELEASE}}"
          fi
          git tag $TAG

          export GIT_SSH_COMMAND="ssh -i $CI_BOT_KEY -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o 'PubkeyAcceptedKeyTypes +ssh-rsa'"

          if [ "$SANDBOX_RUN" == "false" ]; then
              # Push to the LTS branch
              git push ssh://$CI_BOT_USERNAME@$GERRIT_HOST:29418/$GERRIT_PROJECT
          else
              # Push to a sandbox branch so the tag is visible in Gerrit
              git push ssh://${{CI_BOT_USERNAME}}@${{GERRIT_HOST}}:29418/${{GERRIT_PROJECT}} HEAD:refs/heads/${{TAG}}-br
          fi
          # Push tag
          git push ssh://$CI_BOT_USERNAME@$GERRIT_HOST:29418/$GERRIT_PROJECT $TAG

          echo Release tag is created. Further processing happens in the job ${{JENKINS_PUBLIC_URL}}job/hafnium-lts-release-tagged
